<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星ドラ復活プロジェクト</title>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { width: 375px; height: 667px; position: relative; background-color: #000; }
        
        .screen { 
            position: absolute; width: 100%; height: 100%; display: none; 
            background-size: 100% 100%; background-repeat: no-repeat; background-position: center;
        }
        .active { display: block; }

        /* 背景画像の設定 */
        #title-screen { background-image: url('title_bg.jpg'); }
        #loading-screen { background-image: url('loading_bg.png'); }
        #home-screen { background-image: url('home_bg.jpg'); }
        #fukubiki-screen { background-image: url('fukubiki_top.jpg.png'); }

        /* 透明ボタン */
        .trigger { position: absolute; background: transparent; border: none; cursor: pointer; z-index: 100; outline: none; }
        .title-start-btn { width: 240px; height: 100px; left: 50%; top: 55%; transform: translateX(-50%); }
        .home-fukubiki-btn { width: 70px; height: 90px; right: 78px; bottom: 0px; }
        .back-home-btn { width: 75px; height: 90px; left: 0px; bottom: 0px; }
        
        /* 11連ふくびきボタンの位置 */
        .draw-11-btn { width: 220px; height: 65px; left: 50%; bottom: 65px; transform: translateX(-50%); }

        /* 動画表示レイヤー */
        #video-overlay {
            position: absolute; width: 100%; height: 100%;
            background: #000; display: none; z-index: 500;
        }
        #gacha-video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="video-overlay">
        <video id="gacha-video" src="hosidoragatya1.mp4" playsinline></video>
    </div>

    <div id="title-screen" class="screen active">
        <button class="trigger title-start-btn" onclick="startLoading()"></button>
    </div>

    <div id="loading-screen" class="screen"></div>

    <div id="home-screen" class="screen">
        <button class="trigger home-fukubiki-btn" onclick="goTo('fukubiki-screen')"></button>
    </div>

    <div id="fukubiki-screen" class="screen">
        <button class="trigger draw-11-btn" onclick="playGachaVideo()"></button>
        <button class="trigger back-home-btn" onclick="goTo('home-screen')"></button>
    </div>
</div>

<script>
    const videoOverlay = document.getElementById('video-overlay');
    const gachaVideo = document.getElementById('gacha-video');

    function goTo(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        // 動画を止めて隠す
        videoOverlay.style.display = 'none';
        gachaVideo.pause();
        gachaVideo.currentTime = 0;
    }

    function startLoading() {
        goTo('loading-screen');
        setTimeout(() => { goTo('home-screen'); }, 1000);
    }

    function playGachaVideo() {
        videoOverlay.style.display = 'block';
        gachaVideo.play();

        // 動画が終わったら自動的にふくびき画面に戻る
        gachaVideo.onended = function() {
            videoOverlay.style.display = 'none';
        };

        // 画面をタップしても戻れるようにする場合
        videoOverlay.onclick = function() {
            videoOverlay.style.display = 'none';
            gachaVideo.pause();
        };
    }
</script>

</body>
</html>
